    <rect x="620" y="331" width="86" height="10" rx="5" fill="#155EEF"/>
    <rect x="714" y="331" width="58" height="10" rx="5" fill="#D8E1EC"/>
    <rect x="780" y="331" width="34" height="10" rx="5" fill="#EEF4FF"/>

