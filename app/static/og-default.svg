<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Silk UI social share image</title>
  <desc id="desc">A branded Silk UI card with a polished interface preview, gradient lighting, and the text Silk UI, Design-forward Svelte 5 components, and Calm defaults. Real theming. Production-ready primitives.</desc>
  <defs>
    <linearGradient id="bg" x1="86" y1="46" x2="1078" y2="608" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="0.48" stop-color="#F7FAFD"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(235 168) rotate(41.9) scale(346 273)">
      <stop stop-color="#155EEF" stop-opacity="0.23"/>
      <stop offset="1" stop-color="#155EEF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowMint" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(965 148) rotate(136.9) scale(312 256)">
      <stop stop-color="#1DB7A0" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#1DB7A0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardStroke" x1="586" y1="112" x2="1110" y2="564" gradientUnits="userSpaceOnUse">
