<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<link
			href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap"
			rel="stylesheet"
		/>
		<link href="/themes/default.css" rel="stylesheet" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta property="og:image" content="%sveltekit.assets%/og-default.svg" />
		<meta property="og:image:secure_url" content="%sveltekit.assets%/og-default.svg" />
		<meta property="og:image:type" content="image/svg+xml" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />

			property="og:image:alt"
			content="Silk UI social card showing a polished component library preview."
		/>
		<meta name="twitter:card" content="summary_large_image" />

			name="twitter:image:alt"
			content="Silk UI social card showing a polished component library preview."
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
